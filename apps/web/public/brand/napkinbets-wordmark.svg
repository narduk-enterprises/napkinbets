<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 100" fill="none">
  <defs>
    <linearGradient id="wm-bg" x1="0" y1="0" x2="88" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1B4332"/>
      <stop offset="100%" stop-color="#112B21"/>
    </linearGradient>
    <linearGradient id="wm-paper" x1="24" y1="14" x2="60" y2="72" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF8ED"/>
      <stop offset="100%" stop-color="#F2E8D0"/>
    </linearGradient>
  </defs>

  <!-- Icon: mini napkin mark -->
  <g transform="translate(6, 6)">
    <!-- Rounded square background -->
    <rect width="88" height="88" rx="20" fill="url(#wm-bg)"/>

    <!-- Paper sheet -->
    <path d="M24 14H58L70 26V68C70 72 67 76 62 76H24C19 76 16 72 16 68V22C16 18 19 14 24 14Z" fill="url(#wm-paper)"/>

    <!-- Dog-ear -->
    <path d="M58 14V26H70Z" fill="#E8D9B8" opacity="0.7"/>

    <!-- Scorecard lines -->
    <rect x="26" y="30" width="4" height="4" rx="1" stroke="#C9A94E" stroke-width="1" fill="none"/>
    <polyline points="27,32 28,33.5 30,31" stroke="#C9A94E" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="33" y="31" width="26" height="2" rx="1" fill="#1B4332" opacity="0.2"/>

    <rect x="26" y="40" width="4" height="4" rx="1" stroke="#C9A94E" stroke-width="1" fill="none"/>
    <polyline points="27,42 28,43.5 30,41" stroke="#C9A94E" stroke-width="1" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="33" y="41" width="22" height="2" rx="1" fill="#1B4332" opacity="0.15"/>

    <rect x="26" y="50" width="4" height="4" rx="1" stroke="#1B4332" stroke-width="0.8" fill="none" opacity="0.3"/>
    <rect x="33" y="51" width="24" height="2" rx="1" fill="#1B4332" opacity="0.1"/>

    <!-- Tally marks -->
    <g stroke="#1B4332" stroke-width="1" stroke-linecap="round" opacity="0.25">
      <line x1="27" y1="63" x2="27" y2="70"/>
      <line x1="31" y1="63" x2="31" y2="70"/>
      <line x1="35" y1="63" x2="35" y2="70"/>
      <line x1="39" y1="63" x2="39" y2="70"/>
      <line x1="25" y1="69" x2="41" y2="64"/>
    </g>
  </g>

  <!-- Wordmark text -->
  <text x="112" y="67" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="48" letter-spacing="-1" fill="#1B4332">napkin</text>
  <text x="335" y="67" font-family="'Inter', 'Helvetica Neue', Arial, sans-serif" font-weight="700" font-size="48" letter-spacing="-1" fill="#C9A94E">bets</text>
</svg>
